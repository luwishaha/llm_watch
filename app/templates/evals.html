<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>llm-watch Evals</title>
  <script defer src="/static/app.js"></script>
  <style>
    body { margin: 0; font-family: "Segoe UI", "PingFang SC", sans-serif; background: #f0f3f2; color: #1f2428; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 24px; }
    .hero {
      border-radius: 24px;
      padding: 24px;
      background: linear-gradient(125deg, #6b705c, #a5a58d 55%, #ffe8d6);
      color: white;
    }
    .hero h1 { margin: 0 0 8px; }
    .hero p { margin: 0; max-width: 760px; line-height: 1.6; }
    nav { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
    nav a { text-decoration: none; color: #3c4745; background: white; padding: 10px 16px; border-radius: 999px; border: 1px solid #dbdfdc; }
    .panel { background: white; border: 1px solid #d8ddda; border-radius: 20px; padding: 18px; margin-bottom: 16px; box-shadow: 0 10px 28px rgba(27, 38, 35, .05); }
    .panel h2 { margin: 0 0 14px; }
    .result { border-bottom: 1px solid #ecefeb; padding: 14px 0; }
    .result:last-child { border-bottom: 0; }
    .meta { color: #69736f; font-size: 14px; margin-bottom: 8px; }
    .failures { margin-top: 12px; display: grid; gap: 10px; }
    .failure {
      border: 1px solid #ebddd5;
      background: #fff7f3;
      border-radius: 16px;
      padding: 12px;
    }
    .failure code { white-space: pre-wrap; word-break: break-word; }
    .eval-set-list { display: grid; gap: 12px; }
    .eval-set-item {
      border: 1px solid #e1e7e4;
      border-radius: 16px;
      padding: 14px;
      background: #fbfcfb;
    }
    .eval-set-title {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-public { background: #e9f6ff; color: #13678a; }
    .badge-custom { background: #f9eadf; color: #b55b22; }
    .badge-uploaded { background: #eaf5ec; color: #2f6f44; }
    .badge-disabled { background: #f1efeb; color: #6c706f; }
    .empty-state { color: #69736f; }
  </style>
</head>
<body data-page="evals">
  <div class="shell">
    <section class="hero">
      <h1>Eval History</h1>
      <p>查看最近的 benchmark 与 custom eval 结果，同时浏览当前系统里可用的 eval set，方便后续导入、筛选和触发评测。</p>
    </section>
    <nav>
      <a href="/">Dashboard</a>
      <a href="/compare">Compare</a>
      <a href="/evals">Evals</a>
    </nav>
    <section class="panel">
      <h2>Eval Sets</h2>
      <div class="eval-set-list" id="eval-set-list"></div>
      <div class="empty-state" id="eval-set-empty">暂无 eval set。</div>
    </section>
    <section class="panel">
      <h2>Recent Eval Results</h2>
      <div id="eval-results"></div>
    </section>
  </div>
</body>
</html>
